name: CI

on:
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Lint
        run: make lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Type check
        run: make types

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Install Playwright Chromium for tests
        run: make playwright-install

      - name: Tests
        run: make test