name: CI

on:
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Lint
        run: make lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Type check
        run: make types

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Install Playwright Chromium for tests
        run: make playwright-install

      - name: Tests
        run: make test