# fly.toml app configuration file generated for ai-art-publisher on 2026-05-08T20:04:37+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-art-publisher'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'app_data'
  destination = '/app/data'

[deploy]
  release_command = "python scripts/migrate.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
